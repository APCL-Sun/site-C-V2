  content: >
    본 연구실 대학원생이 "하이브리드 로켓 연소 불안정성에 관한 실험적 연구"로
    2026 한국추진공학회 하계학술대회에서 우수발표논문상을 수상하였습니다.
    이번 연구는 소형 하이브리드 로켓 모터의 연소 불안정 발생 조건을 실험적으로
    규명한 것으로, 향후 배플 설계 연구로 이어질 예정입니다.
