# =====================================================
# news.yml — 연구실 소식 (News & Gallery)
# 이 파일은 후배님들이 직접 수정하는 파일입니다.
# 아래 예시 블록을 통째로 복사해서 "제일 위"에 붙여넣고 내용만 바꿔주세요.
# (최신 소식이 항상 위로 오도록, 새 글은 맨 위에 추가합니다)
#
# 사진은 assets/images/news/ 폴더에 먼저 올린 뒤 파일명을 images: 아래에 적어주세요.
# 사진이 없으면 images: [] 로 두면 됩니다.
# =====================================================
