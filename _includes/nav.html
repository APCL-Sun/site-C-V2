<header class="site-header">
  {% if site.recruiting %}
  <div class="recruit-banner">
    {{ site.recruiting_text }} <a href="{{ '/contact/' | relative_url }}">자세히 보기 →</a>
  </div>
  {% endif %}
  <nav class="nav">
    <a class="nav-brand" href="{{ '/' | relative_url }}">
      <span class="lab-code">APCL</span>
      <span>{{ site.lab_name_kr }}</span>
    </a>
    <button class="nav-toggle" aria-label="메뉴 열기" aria-expanded="false" id="navToggle">☰</button>
    <ul class="nav-links" id="navLinks">
      <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
      <li><a href="{{ '/research/' | relative_url }}" {% if page.url contains 'research' %}class="active"{% endif %}>Research</a></li>
      <li><a href="{{ '/news/' | relative_url }}" {% if page.url contains 'news' %}class="active"{% endif %}>News&nbsp;&amp;&nbsp;Gallery</a></li>
      <li><a href="{{ '/members/' | relative_url }}" {% if page.url contains 'members' %}class="active"{% endif %}>Members</a></li>
      <li><a href="{{ '/publications/' | relative_url }}" {% if page.url contains 'publications' %}class="active"{% endif %}>Publications</a></li>
      <li><a href="{{ '/contact/' | relative_url }}" {% if page.url contains 'contact' %}class="active"{% endif %}>Contact</a></li>
    </ul>
  </nav>
</header>
